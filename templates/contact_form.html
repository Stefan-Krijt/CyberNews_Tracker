{% extends "index.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}
    <div class="form-container">
        <h2>Contact CyberNews Tracker</h2>
        <p class="contact-description">Have a cybersecurity tip? Found a vulnerability? Want to suggest an improvement?<br>
        Fill out the form below and we'll get back to you!</p>

        <form action="{{ url_for('submit_message') }}" method="POST">
            <div class="contact-field">
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="contact-field">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="contact-field">
                <label for="message">Message:</label>
                <textarea name="message" id="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="contact-submit">Send Message</button>
        </form>
    </div>
{% endblock %}
